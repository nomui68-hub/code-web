<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Làm bài thi</title>
  <link rel="stylesheet" href="css/style.css?v=20260719135741" />
  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$','$$'], ['\\[','\\]']], processEscapes: true, macros: { heva: ['\\begin{cases}#1\\end{cases}',1], hoac: ['\\begin{array}{l}#1\\end{array}',1] } } };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js?v=20260719135741"></script>
</head>
<body>
  <header class="exam-topbar">
    <div>
      <strong>Thầy Đoàn Văn Mùi</strong>
      <span id="studentBox"></span>
    </div>
    <div id="timer" class="timer">90:00</div>
  </header>

  <main class="container">
    <section class="card">
      <h1 id="examTitle">Đề thi trực tuyến</h1>
      <p id="examInfo" class="muted">Đang tải cấu hình đề...</p>
      <p class="muted">Hết giờ hệ thống tự nộp bài. Học sinh chỉ xem tổng điểm sau khi nộp.</p>
      <div class="toolbar">
        <button id="shuffleBtn" class="btn" style="display:none">Trộn câu hỏi</button>
        <button id="submitBtn" class="btn primary">Nộp bài</button>
      </div>
    </section>

    <section class="card exam-progress-card" id="examProgressCard">
      <div class="exam-progress-line"><div class="exam-progress-fill" id="examProgressFill"></div></div>
      <div class="exam-progress-meta"><span id="examProgressText">Đã làm 0/0 câu</span><span id="examAutosaveText">Tự động lưu bài</span></div>
      <div class="question-nav" id="questionNav"></div>
    </section>

    <section id="questions"></section>
  </main>

  <script src="js/config.js?v=20260719135741"></script>
  <script src="js/api.js?v=20260719135741"></script>
  <script src="js/exam.js?v=20260719135741"></script>
</body>
</html>
