<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách kết quả</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="hero"><h1>DANH SÁCH KẾT QUẢ</h1><p>Thầy Đoàn Văn Mùi</p></header>
<main class="container wide">
  <section class="card">
    <div class="toolbar">
      <select id="examFilter" class="input-select"><option value="">Tất cả đề</option></select>
      <input id="classFilter" placeholder="Lọc theo lớp">
      <button id="exportBtn">Xuất CSV</button>
      <button id="clearBtn" class="secondary">Xóa dữ liệu cục bộ</button>
      <a class="biglink small" href="index.html">Về trang chủ</a>
    </div>
    <p id="summary" class="muted"></p>
    <div class="table-wrap">
      <table class="results-table">
        <thead><tr><th>STT</th><th>Mã HS</th><th>Họ tên</th><th>Lớp</th><th>Đề</th><th>Điểm</th><th>TN</th><th>Đ/S</th><th>TLN</th><th>Đúng</th><th>Thời gian</th></tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </section>
</main>
<script src="js/results.js"></script>
</body>
</html>
