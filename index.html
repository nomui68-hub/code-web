<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống thi Toán</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="hero"><h1>THẦY ĐOÀN VĂN MÙI</h1><p>Hệ thống thi trực tuyến môn Toán</p></header>
<main class="container">
  <section class="card">
    <h2>Đăng nhập làm bài</h2>
    <p class="muted">Học sinh nhập thông tin, chọn đề rồi bắt đầu làm bài.</p>
    <form id="loginForm">
      <label>Mã học sinh</label>
      <input id="studentId" required placeholder="Ví dụ: 1205">
      <label>Họ và tên</label>
      <input id="studentName" required placeholder="Ví dụ: Nguyễn Văn An">
      <label>Lớp</label>
      <input id="className" required placeholder="Ví dụ: 12A3">
      <label>Chọn đề thi</label>
      <select id="examSelect" class="input-select"></select>
      <input id="examId" type="hidden" value="DE_MAU">
      <button type="submit">Bắt đầu làm bài</button>
    </form>
    <p id="examLoadStatus" class="muted"></p>
  </section>
  <section class="card grid2">
    <a class="biglink" href="exam.html">Vào phòng thi</a>
    <a class="biglink" href="results.html">Danh sách kết quả</a>
  </section>
</main>
<script src="js/login.js"></script>
</body>
</html>
