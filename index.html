<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thầy Đoàn Văn Mùi - Thi trực tuyến</title>
  <link rel="stylesheet" href="css/style.css?v=18" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>Thầy Đoàn Văn Mùi</h1>
      <p>Hệ thống thi trực tuyến môn Toán</p>
    </div>
  </header>

  <main class="container narrow">
    <section class="card">
      <h2>Đăng nhập làm bài</h2>
      <p class="muted">Học sinh nhập thông tin và chọn đề được giao để bắt đầu.</p>
      <form id="loginForm" class="form">
        <label for="studentId">Mã học sinh</label>
        <input id="studentId" name="studentId" type="text" placeholder="Ví dụ: 1205" required />

        <label for="studentName">Họ và tên</label>
        <input id="studentName" name="studentName" type="text" placeholder="Ví dụ: Nguyễn Văn An" required />

        <label for="className">Lớp</label>
        <input id="className" name="className" type="text" placeholder="Ví dụ: 12A3" required />

        <label for="examSelect">Chọn đề thi</label>
        <select id="examSelect" name="examSelect" required>
          <option value="DE_MAU">Đang tải danh sách đề...</option>
        </select>
        <input id="examId" name="examId" type="hidden" value="DE_MAU" />
        <p id="examLoadStatus" class="muted">Đang tải danh sách đề...</p>

        <button type="submit" class="btn primary">Bắt đầu làm bài</button>
      </form>
    </section>

    <section class="card">
      <p class="muted">Sau khi nộp bài, học sinh chỉ xem tổng điểm. Bảng điểm và chi tiết bài làm chỉ dành cho giáo viên.</p>
    </section>
  </main>

  <script src="js/login.js?v=18"></script>
</body>
</html>
